<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRayerbox Daily Readings</title>
    <meta name="theme-color" content="#0d6b57">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <script src="./config.js"></script>
    <script type="module" src="./pwa.js"></script>
    <style>
      :root { --bg:#f3efe4; --panel:#fffaf0; --ink:#1b1a17; --muted:#6f675d; --accent:#0d6b57; --accent-strong:#084c3e; --line:#d8cfbf; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; font-family:Georgia,"Times New Roman",serif; color:var(--ink); background:radial-gradient(circle at top left, rgba(13,107,87,.12), transparent 30%), linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%); }
      main { max-width:760px; margin:0 auto; padding:20px 20px 64px; }
      h1 { margin:0 0 8px; font-size:clamp(2rem,5vw,3.4rem); line-height:1; }
      p { color:var(--muted); line-height:1.6; }
      a { color:var(--accent-strong); }
      .topbar-wrap { position:sticky; top:0; z-index:40; margin-left:calc(50% - 50vw); margin-right:calc(50% - 50vw); padding:0 0 14px; background:linear-gradient(180deg, rgba(243,239,228,.96) 0%, rgba(243,239,228,.86) 74%, rgba(243,239,228,0) 100%); backdrop-filter:blur(14px); }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 20px; border-bottom:1px solid var(--line); background:color-mix(in srgb, var(--panel) 92%, white 8%); box-shadow:0 10px 24px rgba(27,26,23,.08); }
      .topnav { display:flex; flex-wrap:wrap; gap:10px; }
      .topnav a { display:inline-block; padding:10px 14px; border-radius:999px; text-decoration:none; background:rgba(13,107,87,.08); }
      .notify-link { display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; text-decoration:none; background:rgba(13,107,87,.16); font-weight:600; }
      .notify-count { min-width:1.45rem; padding:2px 6px; border-radius:999px; background:var(--accent-strong); color:#fff; font-size:.78rem; line-height:1.2; text-align:center; }
      .mobile-top-title { display:block; font-size:1.2rem; font-weight:700; align-self:center; color:var(--ink); }
      .nav-toggle { position:absolute; opacity:0; pointer-events:none; }
      .mobile-nav-button { display:none; width:48px; height:48px; border-radius:14px; background:var(--accent); cursor:pointer; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(27,26,23,.12); }
      .mobile-nav-button span { display:block; width:20px; height:2px; background:#fff; position:relative; }
      .mobile-nav-button span::before, .mobile-nav-button span::after { content:""; position:absolute; left:0; width:20px; height:2px; background:#fff; }
      .mobile-nav-button span::before { top:-6px; }
      .mobile-nav-button span::after { top:6px; }
      .mobile-overlay { display:none; }
      .mobile-drawer { position:fixed; top:0; left:0; height:100vh; width:min(280px, 82vw); padding:88px 18px 24px; background:var(--panel); border-right:1px solid var(--line); box-shadow:0 18px 40px rgba(27,26,23,.18); transform:translateX(-100%); transition:transform .22s ease; z-index:60; }
      .mobile-drawer nav { display:grid; gap:10px; }
      .mobile-drawer a { display:block; padding:12px 14px; border-radius:14px; text-decoration:none; background:rgba(13,107,87,.08); }
      .panel { margin-top:12px; padding:24px; border:1px solid var(--line); border-radius:18px; background:color-mix(in srgb, var(--panel) 88%, white 12%); box-shadow:0 14px 40px rgba(27,26,23,.08); }
      .cta { display:inline-block; margin-top:18px; padding:12px 16px; border-radius:999px; text-decoration:none; font-weight:600; color:#fff; background:var(--accent); }
      .note { margin-top:16px; font-size:.95rem; }
      .quote { margin-top:20px; padding:18px; border-left:4px solid var(--accent); background:rgba(13,107,87,.08); color:var(--ink); }
      .content h4 { margin:20px 0 8px; }
      .content p { color:var(--ink); }
      .content a { color:var(--accent-strong); }
      .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
      button { padding:12px 16px; border:0; border-radius:999px; font:inherit; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
      button.secondary { background:var(--accent-strong); }
      button:disabled { opacity:.6; cursor:wait; }
      .recording-panel { margin-bottom:18px; }
      .grid { display:grid; gap:12px; }
      @media (min-width:640px) { .grid.two { grid-template-columns:1fr 1fr; } }
      label { display:block; font-size:.92rem; margin-bottom:6px; color:var(--muted); }
      .group-heading { font-size:1.08rem; font-weight:700; color:var(--ink); margin-bottom:10px; }
      .status { margin-top:14px; padding:12px 14px; border-radius:12px; background:rgba(13,107,87,.08); color:var(--ink); white-space:pre-wrap; }
      .status.error { background:rgba(161,40,40,.1); color:#a12828; }
      audio { width:100%; margin-top:14px; }
      .icon-button { width:46px; height:46px; padding:0; display:inline-flex; align-items:center; justify-content:center; border-radius:14px; font-size:1.15rem; line-height:1; }
      .audio-tools { display:grid; grid-template-columns:repeat(4, 46px); justify-content:start; gap:10px; margin-top:12px; }
      .audio-tools .icon-button { border-radius:999px; }
      .audio-tools .icon-button.slot-hidden { visibility:hidden; pointer-events:none; }
      .reading-scroll { max-height:min(62vh, 760px); overflow:auto; padding-right:8px; }
      .reading-scroll::-webkit-scrollbar { width:10px; }
      .reading-scroll::-webkit-scrollbar-thumb { background:rgba(13,107,87,.26); border-radius:999px; }
      .reading-scroll::-webkit-scrollbar-track { background:rgba(13,107,87,.06); border-radius:999px; }
      @media (max-width:720px) {
        .topnav { display:none; }
        .mobile-nav-button { display:flex; }
        .notify-link { margin-left:auto; }
        .nav-toggle:checked ~ .mobile-overlay { display:block; position:fixed; inset:0; background:rgba(27,26,23,.36); z-index:55; }
        .nav-toggle:checked ~ .mobile-drawer { transform:translateX(0); }
        .reading-scroll { max-height:58vh; }
      }
    </style>
  </head>
  <body>
    <main>
      <input id="nav-toggle" class="nav-toggle" type="checkbox">
      <div class="topbar-wrap">
      <div class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
          <label for="nav-toggle" class="mobile-nav-button" aria-label="Open navigation menu"><span></span></label>
          <div class="mobile-top-title">Daily Readings</div>
          <nav class="topnav" aria-label="Primary">
            <a href="./home.html">Home</a>
            <a href="./community.html">Community</a>
            <a href="./members.html">Members</a>
            <a href="./chat.html">Chat</a>
            <a href="./readings.html">Daily Readings</a>
            <a href="./controls.html">Controls</a>
            <a href="./notifications.html">Notifications</a>
            <a href="./settings.html">Settings</a>
          </nav>
        </div>
        <a class="notify-link" href="./notifications.html">Alerts <span class="notify-count" data-notify-count hidden>0</span></a>
      </div>
      </div>
      <label for="nav-toggle" class="mobile-overlay" aria-hidden="true"></label>
      <aside class="mobile-drawer" aria-label="Mobile navigation">
        <nav>
          <a href="./home.html">Home</a>
          <a href="./community.html">Community</a>
          <a href="./members.html">Members</a>
          <a href="./chat.html">Chat</a>
          <a href="./readings.html">Daily Readings</a>
          <a href="./controls.html">Controls</a>
          <a href="./notifications.html">Notifications</a>
          <a href="./settings.html">Settings</a>
        </nav>
      </aside>
      <section class="panel">
        <div id="status" class="quote">Loading today's reading...</div>
        <div class="recording-panel">
          <div id="active-group" class="note">Loading your selected community...</div>
          <div id="recording-status" class="status">No community recording loaded yet.</div>
          <div id="recording-meta" class="note"></div>
          <audio id="shared-audio" controls preload="none"></audio>
          <div class="audio-tools">
            <button id="record-button" class="icon-button" aria-label="Record reading" title="Record reading">●</button>
            <button id="stop-button" class="secondary icon-button" aria-label="Stop recording" title="Stop recording" disabled>■</button>
            <button id="delete-audio" class="secondary icon-button slot-hidden" aria-label="Delete recording" title="Delete recording">⌫</button>
            <button id="refresh-audio" class="secondary icon-button" aria-label="Refresh latest audio" title="Refresh latest audio">↻</button>
          </div>
        </div>
        <div class="reading-scroll">
          <div id="reading-meta" class="note"></div>
          <div id="reading-content" class="content"></div>
          <a class="cta" id="official-link" href="https://bible.usccb.org/daily-bible-reading" target="_blank" rel="noopener noreferrer">Open Official USCCB Page</a>
        </div>
      </section>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const config = window.PRAYERBOX_PORTAL_CONFIG || {};
      const projectUrl = config.projectUrl || "";
      const anonKey = config.anonKey || "";
      const SELECTED_GROUP_STORAGE_KEY = "prayerboxSelectedGroupSlug";
      const supabase = projectUrl && anonKey ? createClient(projectUrl, anonKey) : null;
      const activeGroupEl = document.querySelector("#active-group");
      const statusEl = document.querySelector("#status");
      const metaEl = document.querySelector("#reading-meta");
      const contentEl = document.querySelector("#reading-content");
      const officialLinkEl = document.querySelector("#official-link");
      const recordButton = document.querySelector("#record-button");
      const stopButton = document.querySelector("#stop-button");
      const deleteAudioButton = document.querySelector("#delete-audio");
      const recordingStatusEl = document.querySelector("#recording-status");
      const recordingMetaEl = document.querySelector("#recording-meta");
      const sharedAudioEl = document.querySelector("#shared-audio");
      const refreshAudioButton = document.querySelector("#refresh-audio");
      let currentReadingDate = new Date().toISOString().slice(0, 10);
      let currentGroups = [];
      let mediaRecorder = null;
      let recordingStartedAt = null;
      let audioChunks = [];
      let recordingLocked = false;
      let recordingCanManage = false;

      function decodeHtmlEntities(input) {
        const textarea = document.createElement("textarea");
        textarea.innerHTML = input || "";
        return textarea.value;
      }

      function setRecordingStatus(message, isError = false) {
        recordingStatusEl.textContent = message;
        recordingStatusEl.classList.toggle("error", isError);
      }

      function preferredMimeType() {
        const candidates = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/mp4",
        ];

        return candidates.find((type) => window.MediaRecorder && MediaRecorder.isTypeSupported(type)) || "";
      }

      async function getSession() {
        if (!supabase) {
          return null;
        }

        const { data } = await supabase.auth.getSession();
        return data.session;
      }

      async function authedFetch(path, options = {}) {
        const session = await getSession();
        if (!session) {
          throw new Error("Sign in on the home page first.");
        }

        return fetch(`${projectUrl}${path}`, {
          ...options,
          headers: {
            apikey: anonKey,
            Authorization: `Bearer ${session.access_token}`,
            ...(options.headers || {}),
          },
        });
      }

      function setNotificationBadge(count) {
        document.querySelectorAll("[data-notify-count]").forEach((badge) => {
          badge.hidden = !count;
          badge.textContent = count > 99 ? "99+" : String(count || 0);
        });
      }

      function selectedGroupSlug() {
        return localStorage.getItem(SELECTED_GROUP_STORAGE_KEY) || "";
      }

      function updateRecordingButtons() {
        const hasGroup = Boolean(selectedGroupSlug());
        const hasRecorder = Boolean(navigator.mediaDevices?.getUserMedia && window.MediaRecorder);
        const isRecording = Boolean(mediaRecorder && mediaRecorder.state === "recording");
        recordButton.disabled = !hasGroup || !hasRecorder || isRecording || (recordingLocked && !recordingCanManage);
        stopButton.disabled = !isRecording;
        deleteAudioButton.classList.toggle("slot-hidden", !recordingLocked || !recordingCanManage);
        deleteAudioButton.disabled = isRecording || !recordingLocked || !recordingCanManage;
        recordButton.title = recordingLocked && recordingCanManage ? "Replace recording" : "Record reading";
        recordButton.setAttribute("aria-label", recordingLocked && recordingCanManage ? "Replace recording" : "Record reading");
      }

      function renderGroups(groups) {
        currentGroups = groups || [];
        if (!currentGroups.length) {
          activeGroupEl.textContent = "Choose your active community in Settings first.";
          updateRecordingButtons();
          return;
        }
        const savedGroupSlug = selectedGroupSlug();
        const activeGroup = currentGroups.find((group) => group.slug === savedGroupSlug) || currentGroups[0];
        if (activeGroup && activeGroup.slug !== savedGroupSlug) {
          localStorage.setItem(SELECTED_GROUP_STORAGE_KEY, activeGroup.slug);
        }
        activeGroupEl.textContent = activeGroup
          ? ""
          : "Choose your active community in Settings first.";
        updateRecordingButtons();
      }

      async function refreshRecordingUi() {
        const session = await getSession();
        if (!session) {
          renderGroups([]);
          setRecordingStatus("Sign in to listen to or share a community recording.");
          setNotificationBadge(0);
          return;
        }

        try {
          const notifyResponse = await authedFetch("/functions/v1/my-notifications", { method: "GET" });
          const notifyPayload = await notifyResponse.json();
          if (notifyResponse.ok && notifyPayload.ok) {
            setNotificationBadge(notifyPayload.unreadCount || 0);
          }
          const response = await authedFetch("/functions/v1/my-groups", { method: "GET" });
          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || "Failed to load your communities.");
          }

          renderGroups(payload.groups || []);
          if (payload.groups?.length) {
            await loadLatestRecording();
          } else {
            setRecordingStatus("Join or create a community in the main portal before using recordings.");
          }
        } catch (error) {
          setRecordingStatus(error.message || "Failed to load your communities.", true);
          setNotificationBadge(0);
        }
      }

      async function loadLatestRecording() {
        const groupSlug = selectedGroupSlug();
        if (!groupSlug) {
          recordingLocked = false;
          recordingCanManage = false;
          sharedAudioEl.removeAttribute("src");
          sharedAudioEl.load();
          recordingMetaEl.textContent = "";
          setRecordingStatus("Choose a community to load that group's recording.");
          updateRecordingButtons();
          return;
        }

        try {
          const response = await authedFetch(`/functions/v1/daily-reading-recordings?readingDate=${currentReadingDate}&groupSlug=${encodeURIComponent(groupSlug)}`, {
            method: "GET",
          });
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || "Failed to load daily reading audio.");
          }

          const recording = payload.recording;
          if (!recording) {
            recordingLocked = false;
            recordingCanManage = false;
            sharedAudioEl.removeAttribute("src");
            sharedAudioEl.load();
            recordingMetaEl.textContent = "";
            setRecordingStatus("No recording for this community yet today.");
            updateRecordingButtons();
            return;
          }

          recordingLocked = true;
          recordingCanManage = Boolean(recording.canManage);
          sharedAudioEl.src = recording.audioUrl;
          recordingMetaEl.textContent = "";
          setRecordingStatus(recordingCanManage
            ? "You submitted today's daily reading. You can replace or delete it."
            : `${recording.createdBy || "Someone"} submitted a daily reading today.`);
          updateRecordingButtons();
        } catch (error) {
          recordingLocked = false;
          recordingCanManage = false;
          setRecordingStatus(error.message || "Failed to load daily reading audio.", true);
          updateRecordingButtons();
        }
      }

      async function deleteRecording() {
        const groupSlug = selectedGroupSlug();
        if (!groupSlug) {
          throw new Error("Choose a community group first.");
        }
        if (!recordingLocked || !recordingCanManage) {
          throw new Error("You can only delete your own recording.");
        }

        const response = await authedFetch(`/functions/v1/daily-reading-recordings?readingDate=${currentReadingDate}&groupSlug=${encodeURIComponent(groupSlug)}`, {
          method: "DELETE",
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "Failed to delete recording.");
        }

        recordingLocked = false;
        recordingCanManage = false;
        sharedAudioEl.pause();
        sharedAudioEl.removeAttribute("src");
        sharedAudioEl.load();
        recordingMetaEl.textContent = "";
        setRecordingStatus("Recording deleted. Another member can now record today's reading.");
        updateRecordingButtons();
      }

      async function uploadRecording(blob, durationMs) {
        const session = await getSession();
        const groupSlug = selectedGroupSlug();
        if (!session) {
          throw new Error("Sign in on the home page before uploading a reading.");
        }
        if (!groupSlug) {
          throw new Error("Choose a community group first.");
        }

        const extension = blob.type.includes("mp4") ? "m4a" : "webm";
        const file = new File([blob], `reading-${currentReadingDate}.${extension}`, {
          type: blob.type || "audio/webm",
        });

        const form = new FormData();
        form.append("audio", file);
        form.append("groupSlug", groupSlug);
        form.append("readingDate", currentReadingDate);
        form.append("durationMs", String(durationMs));

        const response = await fetch(`${projectUrl}/functions/v1/daily-reading-recordings`, {
          method: "POST",
          headers: {
            apikey: anonKey,
            Authorization: `Bearer ${session.access_token}`,
          },
          body: form,
        });

        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.error || "Failed to upload recording.");
        }

        const pushResult = payload.pushResult || {};
        if (pushResult.attempted === 0) {
          setRecordingStatus(`Recording uploaded for ${groupSlug}. Push attempted 0 subscriptions for recipients.`, true);
        } else {
          setRecordingStatus(`Recording uploaded for ${groupSlug}. Push sent ${pushResult.sent || 0} of ${pushResult.attempted || 0} attempted subscriptions.`);
        }
        await loadLatestRecording();
      }

      async function startRecording() {
        const session = await getSession();
        if (!session) {
          throw new Error("Sign in on the home page before recording.");
        }

        if (!selectedGroupSlug()) {
          throw new Error("Choose a community group first.");
        }
        if (recordingLocked) {
          throw new Error("Today's reading is already recorded for this community.");
        }

        if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
          throw new Error("This device/browser does not support in-browser recording.");
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = preferredMimeType();
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
        audioChunks = [];
        recordingStartedAt = Date.now();

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach((track) => track.stop());
          try {
            const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
            const durationMs = Math.max(0, Date.now() - (recordingStartedAt || Date.now()));
            await uploadRecording(blob, durationMs);
          } catch (error) {
            setRecordingStatus(error.message || "Failed to process recording.", true);
          } finally {
            mediaRecorder = null;
            recordingStartedAt = null;
            audioChunks = [];
            updateRecordingButtons();
          }
        };

        mediaRecorder.start();
        updateRecordingButtons();
        setRecordingStatus(`Recording in progress for ${selectedGroupSlug()}. Tap Stop when you finish.`);
      }

      function stopRecording() {
        if (!mediaRecorder || mediaRecorder.state !== "recording") {
          return;
        }

        mediaRecorder.stop();
        setRecordingStatus("Uploading recording...");
      }

      async function loadReading() {
        if (!projectUrl) {
          statusEl.textContent = "Portal config is missing. Ask the admin to update portal/config.js.";
          return;
        }

        try {
          const response = await fetch(`${projectUrl}/functions/v1/daily-readings`);
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || "Failed to load daily reading.");
          }

          const reading = payload.reading;
          statusEl.textContent = reading.title || "Today's Reading";
          currentReadingDate = reading.pubDate ? new Date(reading.pubDate).toISOString().slice(0, 10) : currentReadingDate;
          metaEl.innerHTML = `
            Published: ${reading.pubDate || "Unknown"}<br>
            Source: <a href="${reading.link || "https://bible.usccb.org/daily-bible-reading"}" target="_blank" rel="noopener noreferrer">${reading.sourceName || "USCCB"}</a>
          `;
          officialLinkEl.href = reading.link || "https://bible.usccb.org/daily-bible-reading";
          contentEl.innerHTML = decodeHtmlEntities(reading.descriptionEncoded || "");
        } catch (error) {
          statusEl.textContent = error.message || "Failed to load daily reading.";
          contentEl.innerHTML = "";
        }
      }

      recordButton.addEventListener("click", async () => {
        try {
          await startRecording();
        } catch (error) {
          setRecordingStatus(error.message || "Failed to start recording.", true);
        }
      });

      stopButton.addEventListener("click", stopRecording);
      deleteAudioButton.addEventListener("click", async () => {
        try {
          await deleteRecording();
        } catch (error) {
          setRecordingStatus(error.message || "Failed to delete recording.", true);
        }
      });
      refreshAudioButton.addEventListener("click", loadLatestRecording);

      await loadReading();
      await refreshRecordingUi();
    </script>
  </body>
</html>
