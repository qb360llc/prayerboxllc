<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRayerbox Controls</title>
    <script src="./config.js"></script>
    <style>
      :root { --bg:#f3efe4; --panel:#fffaf0; --ink:#1b1a17; --muted:#6f675d; --accent:#0d6b57; --accent-strong:#084c3e; --line:#d8cfbf; --danger:#a12828; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; font-family:Georgia,"Times New Roman",serif; color:var(--ink); background:radial-gradient(circle at top left, rgba(13,107,87,.12), transparent 30%), linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%); }
      main { max-width:760px; margin:0 auto; padding:32px 20px 64px; }
      h1 { margin:0 0 8px; font-size:clamp(2rem,5vw,3.4rem); line-height:1; }
      p { color:var(--muted); line-height:1.5; }
      a { color:var(--accent-strong); }
      .topbar { display:flex; justify-content:flex-end; gap:10px; }
      .topnav { display:flex; flex-wrap:wrap; gap:10px; }
      .topnav a { display:inline-block; padding:10px 14px; border-radius:999px; text-decoration:none; background:rgba(13,107,87,.08); }
      .hero { margin-top:18px; }
      .panel { margin-top:24px; padding:20px; border:1px solid var(--line); border-radius:18px; background:color-mix(in srgb, var(--panel) 88%, white 12%); box-shadow:0 14px 40px rgba(27,26,23,.08); }
      .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
      button { padding:12px 16px; border:0; border-radius:999px; font:inherit; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
      button.secondary { background:var(--accent-strong); }
      button:disabled { opacity:.6; cursor:wait; }
      .status { margin-top:16px; padding:12px 14px; border-radius:12px; background:rgba(13,107,87,.08); color:var(--ink); white-space:pre-wrap; }
      .status.error { background:rgba(161,40,40,.1); color:var(--danger); }
      .device-list { display:grid; gap:12px; margin-top:16px; }
      .device-card { padding:16px; border:1px solid var(--line); border-radius:16px; background:rgba(255,255,255,.55); }
      .device-card strong { display:block; margin-bottom:8px; }
      .pill-row { display:flex; flex-wrap:wrap; gap:8px; }
      .pill { display:inline-block; padding:4px 10px; border-radius:999px; background:rgba(13,107,87,.12); color:var(--accent-strong); font-size:.85rem; }
      .pill.offline { background:rgba(161,40,40,.12); color:var(--danger); }
      .helper { margin-top:12px; font-size:.95rem; color:var(--muted); }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <nav class="topnav" aria-label="Primary">
          <a href="./index.html">Controls</a>
          <a href="./settings.html">Settings</a>
          <a href="./readings.html">Daily Readings</a>
          <a href="./admin.html">Admin</a>
        </nav>
      </div>
      <div class="hero">
        <h1>PRayerbox Controls</h1>
        <p>Use this page only for controlling your lights. Group setup and claims live in Settings.</p>
      </div>

      <section class="panel">
        <h2>Session</h2>
        <div id="session-state" class="status">Checking sign-in...</div>
        <div class="helper">If this says signed out, open <a href="./settings.html">Settings</a> to sign in.</div>
      </section>

      <section class="panel">
        <h2>My Lights</h2>
        <div class="actions">
          <button id="refresh-devices">Refresh Devices</button>
          <a href="./settings.html">Open Settings</a>
        </div>
        <div id="devices-empty" class="status">No devices loaded yet.</div>
        <div id="devices-list" class="device-list"></div>
      </section>

      <section class="panel">
        <h2>Status</h2>
        <div id="status" class="status">Idle.</div>
      </section>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const config = window.PRAYERBOX_PORTAL_CONFIG || {};
      const projectUrl = config.projectUrl || "";
      const anonKey = config.anonKey || "";
      const els = {
        devicesEmpty: document.querySelector("#devices-empty"),
        devicesList: document.querySelector("#devices-list"),
        refreshDevices: document.querySelector("#refresh-devices"),
        sessionState: document.querySelector("#session-state"),
        status: document.querySelector("#status"),
      };
      let supabase = null;

      function setStatus(message, isError = false) {
        els.status.textContent = message;
        els.status.classList.toggle("error", isError);
      }

      function getClient() {
        if (!projectUrl || !anonKey) {
          throw new Error("Portal config is missing. Ask the admin to update portal/config.js.");
        }
        if (!supabase) {
          supabase = createClient(projectUrl, anonKey);
        }
        return supabase;
      }

      async function authedFetch(path, options = {}) {
        const client = getClient();
        const { data: sessionData } = await client.auth.getSession();
        const accessToken = sessionData.session?.access_token;
        if (!accessToken) throw new Error("Sign in first from the Settings page.");
        return fetch(`${projectUrl}${path}`, {
          ...options,
          headers: {
            apikey: anonKey,
            Authorization: `Bearer ${accessToken}`,
            ...(options.headers || {}),
          },
        });
      }

      async function refreshSessionState() {
        try {
          const client = getClient();
          const { data } = await client.auth.getSession();
          const session = data.session;
          if (!session) {
            els.sessionState.textContent = "Signed out. Open Settings to sign in, claim devices, or manage communities.";
            return false;
          }
          els.sessionState.textContent = `Signed in as ${session.user.email}`;
          return true;
        } catch (error) {
          els.sessionState.textContent = error.message || "Session unavailable.";
          return false;
        }
      }

      function renderDevices(ownerEmail, devices) {
        els.devicesList.innerHTML = "";
        if (!devices.length) {
          els.devicesEmpty.textContent = ownerEmail ? `No claimed devices found for ${ownerEmail}.` : "No devices loaded yet.";
          return;
        }

        els.devicesEmpty.textContent = `${devices.length} light${devices.length === 1 ? "" : "s"} loaded.`;
        devices.forEach((device) => {
          const card = document.createElement("div");
          card.className = "device-card";
          card.innerHTML = `
            <strong>${device.displayName || device.deviceId}</strong>
            <div class="pill-row">
              <span class="pill">${device.groupName || device.groupId || "No group"}</span>
              <span class="pill ${device.isOnline ? "" : "offline"}">${device.isOnline ? "Online" : "Offline"}</span>
              <span class="pill">${device.isActive ? "Active" : "Inactive"}</span>
            </div>
            <div class="actions">
              <button class="toggle-device" data-device-id="${device.deviceId}" data-next-active="${device.isActive ? "false" : "true"}">${device.isActive ? "Turn Off" : "Turn On"}</button>
            </div>`;
          els.devicesList.appendChild(card);
        });

        els.devicesList.querySelectorAll(".toggle-device").forEach((button) => {
          button.addEventListener("click", () => wrap(
            () => toggleDevice(button.dataset.deviceId, button.dataset.nextActive === "true"),
            button,
          ));
        });
      }

      async function loadMyDevices() {
        const client = getClient();
        const { data: sessionData } = await client.auth.getSession();
        const ownerEmail = sessionData.session?.user?.email || "";
        const response = await authedFetch("/functions/v1/my-devices", { method: "GET" });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || payload.message || "Failed to load devices.");
        renderDevices(ownerEmail, payload.devices || []);
        setStatus(`Loaded ${payload.devices.length} device${payload.devices.length === 1 ? "" : "s"}.`);
      }

      async function toggleDevice(deviceId, active) {
        if (!deviceId) throw new Error("Device UID is required.");
        const response = await authedFetch("/functions/v1/set-device-active", {
          body: JSON.stringify({ active, deviceId }),
          headers: { "Content-Type": "application/json" },
          method: "POST",
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || payload.message || "Failed to update device state.");
        setStatus(`${active ? "Turned on" : "Turned off"} ${payload.device.deviceId}. Group mode is now ${payload.groupState.lightingMode}.`);
        await loadMyDevices();
      }

      async function wrap(fn, button) {
        try {
          button.disabled = true;
          await fn();
        } catch (error) {
          setStatus(error.message || "Request failed.", true);
        } finally {
          button.disabled = false;
        }
      }

      els.refreshDevices.addEventListener("click", () => wrap(loadMyDevices, els.refreshDevices));

      const signedIn = await refreshSessionState();
      if (signedIn) {
        await loadMyDevices();
      }
    </script>
  </body>
</html>
