<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRayerbox</title>
    <script src="./config.js"></script>
    <style>
      :root { --bg:#f3efe4; --panel:#fffaf0; --ink:#1b1a17; --muted:#6f675d; --accent:#0d6b57; --accent-strong:#084c3e; --line:#d8cfbf; --danger:#a12828; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; font-family:Georgia,"Times New Roman",serif; color:var(--ink); background:radial-gradient(circle at top left, rgba(13,107,87,.12), transparent 30%), linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%); }
      main { max-width:720px; margin:0 auto; padding:32px 20px 64px; }
      h1 { margin:0 0 8px; font-size:clamp(2rem,5vw,3.4rem); line-height:1; }
      p { color:var(--muted); line-height:1.5; }
      a { color:var(--accent-strong); }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; }
      .panel { margin-top:24px; padding:20px; border:1px solid var(--line); border-radius:18px; background:color-mix(in srgb, var(--panel) 88%, white 12%); box-shadow:0 14px 40px rgba(27,26,23,.08); }
      .grid { display:grid; gap:12px; }
      @media (min-width:640px) { .grid.two { grid-template-columns:1fr 1fr; } }
      label { display:block; font-size:.92rem; margin-bottom:6px; color:var(--muted); }
      input { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px; font:inherit; background:#fff; color:var(--ink); }
      button { padding:12px 16px; border:0; border-radius:999px; font:inherit; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
      button.secondary { background:var(--accent-strong); }
      button:disabled { opacity:.6; cursor:wait; }
      .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
      .status { margin-top:16px; padding:12px 14px; border-radius:12px; background:rgba(13,107,87,.08); color:var(--ink); white-space:pre-wrap; }
      .status.error { background:rgba(161,40,40,.1); color:var(--danger); }
      .kv { display:grid; gap:10px; margin-top:12px; }
      .kv div { padding-bottom:10px; border-bottom:1px solid var(--line); }
      .device-actions { display:flex; gap:10px; margin-top:10px; }
      code { font-family:"Courier New", monospace; }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div>
          <h1>PRayerbox</h1>
          <p>Sign in, claim your device, and control your own lights.</p>
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <a href="./readings.html">Daily Readings</a>
          <a href="./admin.html">Admin Portal</a>
        </div>
      </div>

      <section class="panel">
        <h2>Sign In</h2>
        <div class="grid two">
          <div><label for="email">Email</label><input id="email" type="email" placeholder="you@example.com"></div>
          <div><label for="password">Password</label><input id="password" type="password" placeholder="Password"></div>
        </div>
        <div class="grid" style="margin-top:12px;">
          <div><label for="session-state">Session State</label><input id="session-state" value="Signed out" readonly></div>
        </div>
        <div class="actions">
          <button id="sign-in">Sign In</button>
          <button id="sign-up" class="secondary">Sign Up</button>
          <button id="sign-out" class="secondary">Sign Out</button>
        </div>
      </section>

      <section class="panel">
        <h2>Claim Device</h2>
        <div class="grid">
          <div><label for="claim-code">Claim Code</label><input id="claim-code" placeholder="PBX-XXXXXXXXXXXX"></div>
        </div>
        <div class="actions"><button id="claim-button">Claim Device</button></div>
        <div id="claim-result" class="kv"></div>
      </section>

      <section class="panel">
        <h2>My Devices</h2>
        <p>Only your claimed devices appear here.</p>
        <div class="actions"><button id="refresh-devices">Refresh Devices</button></div>
        <div id="devices-empty" class="status">No claimed devices loaded yet.</div>
        <div id="devices-list" class="kv"></div>
      </section>

      <section class="panel">
        <h2>Status</h2>
        <div id="status" class="status">Idle.</div>
      </section>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const config = window.PRAYERBOX_PORTAL_CONFIG || {};
      const projectUrl = config.projectUrl || "";
      const anonKey = config.anonKey || "";
      const els = {
        claimButton: document.querySelector("#claim-button"),
        claimCode: document.querySelector("#claim-code"),
        claimResult: document.querySelector("#claim-result"),
        devicesEmpty: document.querySelector("#devices-empty"),
        devicesList: document.querySelector("#devices-list"),
        email: document.querySelector("#email"),
        password: document.querySelector("#password"),
        refreshDevices: document.querySelector("#refresh-devices"),
        sessionState: document.querySelector("#session-state"),
        signIn: document.querySelector("#sign-in"),
        signOut: document.querySelector("#sign-out"),
        signUp: document.querySelector("#sign-up"),
        status: document.querySelector("#status"),
      };
      let supabase = null;

      function setStatus(message, isError = false) {
        els.status.textContent = message;
        els.status.classList.toggle("error", isError);
      }

      function getClient() {
        if (!projectUrl || !anonKey) {
          throw new Error("Portal config is missing. Ask the admin to update portal/config.js.");
        }
        if (!supabase) {
          supabase = createClient(projectUrl, anonKey);
        }
        return supabase;
      }

      async function refreshSessionState() {
        try {
          const client = getClient();
          const { data } = await client.auth.getSession();
          const session = data.session;
          els.sessionState.value = session ? `Signed in as ${session.user.email}` : "Signed out";
        } catch (error) {
          els.sessionState.value = "Config incomplete";
          setStatus(error.message, true);
        }
      }

      function renderClaimResult(device) {
        els.claimResult.innerHTML = "";
        if (!device) return;
        [["Device UID", device.device_uid], ["Display Name", device.display_name], ["Group", device.group_slug]].forEach(([label, value]) => {
          const row = document.createElement("div");
          row.innerHTML = `<strong>${label}</strong><code>${value ?? ""}</code>`;
          els.claimResult.appendChild(row);
        });
      }

      function renderDevices(ownerEmail, devices) {
        els.devicesList.innerHTML = "";
        if (!devices.length) {
          els.devicesEmpty.textContent = ownerEmail ? `No claimed devices found for ${ownerEmail}.` : "No claimed devices loaded yet.";
          return;
        }

        els.devicesEmpty.textContent = `${devices.length} claimed device${devices.length === 1 ? "" : "s"} loaded.`;
        devices.forEach((device) => {
          const row = document.createElement("div");
          const nextActive = !device.isActive;
          row.innerHTML = `
            <strong>${device.displayName || device.deviceId}</strong>
            <code>
Owner: ${ownerEmail || "You"}
Device UID: ${device.deviceId}
Group: ${device.groupName || device.groupId || "Unassigned"}
Online: ${device.isOnline ? "Yes" : "No"}
Active: ${device.isActive ? "Yes" : "No"}
Current firmware: ${device.currentVersion || "Unknown"}
Last seen: ${device.lastSeenAt || "Unknown"}
Last firmware report: ${device.lastFirmwareReportAt || "Unknown"}
Last update status: ${device.lastUpdateStatus || "None"}
            </code>
            <div class="device-actions">
              <button class="toggle-device" data-device-id="${device.deviceId}" data-next-active="${nextActive ? "true" : "false"}">${device.isActive ? "Turn Off" : "Turn On"}</button>
            </div>`;
          els.devicesList.appendChild(row);
        });

        els.devicesList.querySelectorAll(".toggle-device").forEach((button) => {
          button.addEventListener("click", () => wrap(
            () => toggleDevice(button.dataset.deviceId, button.dataset.nextActive === "true"),
            button,
          ));
        });
      }

      async function authedFetch(path, options = {}) {
        const client = getClient();
        const { data: sessionData } = await client.auth.getSession();
        const accessToken = sessionData.session?.access_token;
        if (!accessToken) throw new Error("Sign in first.");
        return fetch(`${projectUrl}${path}`, {
          ...options,
          headers: {
            apikey: anonKey,
            Authorization: `Bearer ${accessToken}`,
            ...(options.headers || {}),
          },
        });
      }

      async function loadMyDevices() {
        const client = getClient();
        const { data: sessionData } = await client.auth.getSession();
        const ownerEmail = sessionData.session?.user?.email || "";
        const response = await authedFetch("/functions/v1/my-devices", { method: "GET" });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || payload.message || "Failed to load devices.");
        renderDevices(ownerEmail, payload.devices || []);
        setStatus(`Loaded ${payload.devices.length} claimed device(s).`);
      }

      async function toggleDevice(deviceId, active) {
        if (!deviceId) throw new Error("Device UID is required.");
        const response = await authedFetch("/functions/v1/set-device-active", {
          body: JSON.stringify({ active, deviceId }),
          headers: { "Content-Type": "application/json" },
          method: "POST",
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || payload.message || "Failed to update device state.");
        setStatus(`${active ? "Turned on" : "Turned off"} ${payload.device.deviceId}. Group mode is now ${payload.groupState.lightingMode}.`);
        await loadMyDevices();
      }

      async function signIn(mode) {
        const client = getClient();
        const email = els.email.value.trim();
        const password = els.password.value;
        if (!email || !password) throw new Error("Email and password are required.");
        const method = mode === "signup" ? client.auth.signUp({ email, password }) : client.auth.signInWithPassword({ email, password });
        const { data, error } = await method;
        if (error) throw error;
        if (mode === "signup" && !data.session) {
          setStatus("Sign-up succeeded, but no session was returned. Confirm email or ask admin to disable confirmation.");
          return;
        }
        setStatus(`${mode === "signup" ? "Signed up" : "Signed in"} as ${email}.`);
        await refreshSessionState();
        await loadMyDevices();
      }

      async function signOut() {
        const client = getClient();
        const { error } = await client.auth.signOut();
        if (error) throw error;
        renderClaimResult(null);
        renderDevices("", []);
        setStatus("Signed out.");
        await refreshSessionState();
      }

      async function claimDevice() {
        const claimCode = els.claimCode.value.trim();
        if (!claimCode) throw new Error("Claim code is required.");
        const response = await authedFetch("/functions/v1/claim-device", {
          body: JSON.stringify({ claimCode }),
          headers: { "Content-Type": "application/json" },
          method: "POST",
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || payload.message || "Claim failed.");
        renderClaimResult(payload.device);
        setStatus(`Claimed ${payload.device.device_uid} successfully.`);
        await loadMyDevices();
      }

      async function wrap(fn, button) {
        try {
          button.disabled = true;
          await fn();
        } catch (error) {
          setStatus(error.message || "Request failed.", true);
        } finally {
          button.disabled = false;
        }
      }

      els.signIn.addEventListener("click", () => wrap(() => signIn("signin"), els.signIn));
      els.signUp.addEventListener("click", () => wrap(() => signIn("signup"), els.signUp));
      els.signOut.addEventListener("click", () => wrap(signOut, els.signOut));
      els.claimButton.addEventListener("click", () => wrap(claimDevice, els.claimButton));
      els.refreshDevices.addEventListener("click", () => wrap(loadMyDevices, els.refreshDevices));
      refreshSessionState();
    </script>
  </body>
</html>
