<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRayerbox</title>
    <meta name="theme-color" content="#0d6b57">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <script src="./config.js"></script>
    <script type="module" src="./pwa.js"></script>
    <style>
      :root { --bg:#f3efe4; --panel:#fffaf0; --ink:#1b1a17; --muted:#6f675d; --accent:#0d6b57; --accent-strong:#084c3e; --line:#d8cfbf; --danger:#a12828; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; font-family:Georgia,"Times New Roman",serif; color:var(--ink); background:radial-gradient(circle at top left, rgba(13,107,87,.12), transparent 30%), linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%); }
      main { max-width:520px; min-height:100vh; margin:0 auto; padding:32px 20px 64px; display:grid; align-content:center; }
      h1 { margin:0 0 8px; font-size:clamp(2rem,5vw,3.4rem); line-height:1; }
      p { color:var(--muted); line-height:1.5; }
      a { color:var(--accent-strong); }
      button { padding:12px 16px; border:0; border-radius:999px; font:inherit; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
      button.ghost { background:#fff; color:var(--accent-strong); border:1px solid var(--line); }
      button:disabled { opacity:.6; cursor:wait; }
      input { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px; font:inherit; background:#fff; color:var(--ink); }
      label { display:block; font-size:.92rem; margin-bottom:6px; color:var(--muted); }
      .status { margin-top:16px; padding:12px 14px; border-radius:12px; background:rgba(13,107,87,.08); color:var(--ink); white-space:pre-wrap; }
      .status.error { background:rgba(161,40,40,.1); color:var(--danger); }
      .auth-card { padding:28px; border:1px solid var(--line); border-radius:24px; background:color-mix(in srgb, var(--panel) 90%, white 10%); box-shadow:0 20px 46px rgba(27,26,23,.12); }
      .auth-brand { margin-bottom:20px; }
      .auth-tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:18px 0; padding:6px; border-radius:18px; background:rgba(13,107,87,.08); }
      .auth-tab { border-radius:14px; background:transparent; color:var(--accent-strong); }
      .auth-tab.active { background:var(--accent); color:#fff; }
      .auth-grid { display:grid; gap:12px; }
      .auth-grid.two { grid-template-columns:1fr 1fr; }
      .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
      .auth-helper { margin-top:16px; font-size:.95rem; }
      @media (max-width:720px) {
        .auth-grid.two { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="auth-card">
        <div class="auth-brand">
          <h1>PRayerbox</h1>
          <p>Log in to join your community, share intentions, and keep your lights in sync.</p>
        </div>

        <div class="auth-tabs">
          <button id="mode-signin" class="auth-tab active" type="button">Log In</button>
          <button id="mode-signup" class="auth-tab" type="button">Sign Up</button>
        </div>

        <div class="auth-grid two" id="signup-name-row" hidden>
          <div>
            <label for="auth-first-name">First Name</label>
            <input id="auth-first-name" placeholder="Jane">
          </div>
          <div>
            <label for="auth-last-name">Last Name</label>
            <input id="auth-last-name" placeholder="Doe">
          </div>
        </div>

        <div class="auth-grid" style="margin-top:12px;">
          <div>
            <label for="auth-email">Email</label>
            <input id="auth-email" type="email" placeholder="you@example.com">
          </div>
          <div>
            <label for="auth-password">Password</label>
            <input id="auth-password" type="password" placeholder="Password">
          </div>
          <div id="signup-confirm-row" hidden>
            <label for="auth-confirm-password">Confirm Password</label>
            <input id="auth-confirm-password" type="password" placeholder="Confirm Password">
          </div>
        </div>

        <div class="actions">
          <button id="auth-submit">Log In</button>
          <button id="auth-switch" class="ghost" type="button">Need an account? Sign Up</button>
        </div>
        <div id="auth-status" class="status">Welcome. Sign in to continue.</div>
        <div class="auth-helper">Admins can still use <a href="./admin.html">Admin</a> for device provisioning.</div>
      </section>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const config = window.PRAYERBOX_PORTAL_CONFIG || {};
      const projectUrl = config.projectUrl || "";
      const anonKey = config.anonKey || "";
      const COMMUNITY_URL = "./community.html";
      const els = {
        authConfirmPassword: document.querySelector("#auth-confirm-password"),
        authEmail: document.querySelector("#auth-email"),
        authFirstName: document.querySelector("#auth-first-name"),
        authLastName: document.querySelector("#auth-last-name"),
        authPassword: document.querySelector("#auth-password"),
        authStatus: document.querySelector("#auth-status"),
        authSubmit: document.querySelector("#auth-submit"),
        authSwitch: document.querySelector("#auth-switch"),
        modeSignin: document.querySelector("#mode-signin"),
        modeSignup: document.querySelector("#mode-signup"),
        signupConfirmRow: document.querySelector("#signup-confirm-row"),
        signupNameRow: document.querySelector("#signup-name-row"),
      };

      let authMode = "signin";
      let supabase = null;

      function getClient() {
        if (!projectUrl || !anonKey) {
          throw new Error("Portal config is missing. Ask the admin to update portal/config.js.");
        }
        if (!supabase) {
          supabase = createClient(projectUrl, anonKey);
        }
        return supabase;
      }

      function setAuthStatus(message, isError = false) {
        els.authStatus.textContent = message;
        els.authStatus.classList.toggle("error", isError);
      }

      function setAuthMode(mode) {
        authMode = mode;
        const isSignup = mode === "signup";
        els.modeSignin.classList.toggle("active", !isSignup);
        els.modeSignup.classList.toggle("active", isSignup);
        els.signupNameRow.hidden = !isSignup;
        els.signupConfirmRow.hidden = !isSignup;
        els.authFirstName.disabled = !isSignup;
        els.authLastName.disabled = !isSignup;
        els.authConfirmPassword.disabled = !isSignup;
        if (!isSignup) {
          els.authFirstName.value = "";
          els.authLastName.value = "";
          els.authConfirmPassword.value = "";
        }
        els.authSubmit.textContent = isSignup ? "Create Account" : "Log In";
        els.authSwitch.textContent = isSignup ? "Already have an account? Log In" : "Need an account? Sign Up";
        setAuthStatus(isSignup ? "Create your account to join PRayerbox." : "Welcome back. Log in to continue.");
      }

      async function updateProfileNames(userId, emailFallback) {
        const client = getClient();
        const firstName = els.authFirstName.value.trim();
        const lastName = els.authLastName.value.trim();
        if (!firstName && !lastName) return;
        const displayName = [firstName, lastName].filter(Boolean).join(" ") || emailFallback;
        await client
          .from("profiles")
          .update({
            display_name: displayName,
            first_name: firstName || null,
            last_name: lastName || null,
          })
          .eq("id", userId);
      }

      function redirectToCommunity() {
        window.location.replace(COMMUNITY_URL);
      }

      async function handleAuthSubmit() {
        const client = getClient();
        const email = els.authEmail.value.trim();
        const password = els.authPassword.value;
        if (!email || !password) {
          throw new Error("Email and password are required.");
        }

        if (authMode === "signup") {
          const firstName = els.authFirstName.value.trim();
          const lastName = els.authLastName.value.trim();
          const confirmPassword = els.authConfirmPassword.value;
          if (!firstName || !lastName) {
            throw new Error("First and last name are required for sign up.");
          }
          if (password !== confirmPassword) {
            throw new Error("Passwords do not match.");
          }

          const { data, error } = await client.auth.signUp({ email, password });
          if (error) throw error;

          if (!data.session) {
            setAuthMode("signin");
            setAuthStatus("Account created. Check your email, then log in.", false);
            return;
          }

          await updateProfileNames(data.session.user.id, data.session.user.email?.split("@")[0] || "Community member");
          redirectToCommunity();
          return;
        }

        const { error } = await client.auth.signInWithPassword({ email, password });
        if (error) throw error;
        redirectToCommunity();
      }

      async function wrap(fn, button) {
        try {
          button.disabled = true;
          await fn();
        } catch (error) {
          setAuthStatus(error.message || "Request failed.", true);
        } finally {
          button.disabled = false;
        }
      }

      async function boot() {
        try {
          const client = getClient();
          const { data } = await client.auth.getSession();
          if (data.session) {
            redirectToCommunity();
            return;
          }
          setAuthMode("signin");
        } catch (error) {
          setAuthStatus(error.message || "Unable to load the portal.", true);
        }
      }

      els.modeSignin.addEventListener("click", () => setAuthMode("signin"));
      els.modeSignup.addEventListener("click", () => setAuthMode("signup"));
      els.authSwitch.addEventListener("click", () => setAuthMode(authMode === "signin" ? "signup" : "signin"));
      els.authSubmit.addEventListener("click", () => wrap(handleAuthSubmit, els.authSubmit));

      boot();
    </script>
  </body>
</html>
