<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRayerbox Notifications</title>
    <script src="./config.js"></script>
    <style>
      :root { --bg:#f3efe4; --panel:#fffaf0; --ink:#1b1a17; --muted:#6f675d; --accent:#0d6b57; --accent-strong:#084c3e; --line:#d8cfbf; --danger:#a12828; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; font-family:Georgia,"Times New Roman",serif; color:var(--ink); background:radial-gradient(circle at top left, rgba(13,107,87,.12), transparent 30%), linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%); }
      main { max-width:860px; margin:0 auto; padding:32px 20px 64px; }
      h1 { margin:0 0 8px; font-size:clamp(2rem,5vw,3.4rem); line-height:1; }
      h2 { margin:0; }
      p { color:var(--muted); line-height:1.5; }
      a { color:var(--accent-strong); }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; }
      .topnav { display:flex; flex-wrap:wrap; gap:10px; }
      .topnav a { display:inline-block; padding:10px 14px; border-radius:999px; text-decoration:none; background:rgba(13,107,87,.08); }
      .notify-link { display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; text-decoration:none; background:rgba(13,107,87,.16); font-weight:600; }
      .notify-count { min-width:1.45rem; padding:2px 6px; border-radius:999px; background:var(--accent-strong); color:#fff; font-size:.78rem; line-height:1.2; text-align:center; }
      .mobile-top-title { display:none; font-size:1.2rem; font-weight:700; align-self:center; color:var(--ink); }
      .hero { margin-top:18px; }
      .nav-toggle { position:absolute; opacity:0; pointer-events:none; }
      .mobile-nav-button { display:none; width:48px; height:48px; border-radius:14px; background:var(--accent); cursor:pointer; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(27,26,23,.12); }
      .mobile-nav-button span { display:block; width:20px; height:2px; background:#fff; position:relative; }
      .mobile-nav-button span::before, .mobile-nav-button span::after { content:""; position:absolute; left:0; width:20px; height:2px; background:#fff; }
      .mobile-nav-button span::before { top:-6px; }
      .mobile-nav-button span::after { top:6px; }
      .mobile-overlay { display:none; }
      .mobile-drawer { position:fixed; top:0; left:0; height:100vh; width:min(280px, 82vw); padding:88px 18px 24px; background:var(--panel); border-right:1px solid var(--line); box-shadow:0 18px 40px rgba(27,26,23,.18); transform:translateX(-100%); transition:transform .22s ease; z-index:30; }
      .mobile-drawer nav { display:grid; gap:10px; }
      .mobile-drawer a { display:block; padding:12px 14px; border-radius:14px; text-decoration:none; background:rgba(13,107,87,.08); }
      .panel { margin-top:24px; padding:20px; border:1px solid var(--line); border-radius:18px; background:color-mix(in srgb, var(--panel) 88%, white 12%); box-shadow:0 14px 40px rgba(27,26,23,.08); }
      .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; }
      button { padding:12px 16px; border:0; border-radius:999px; font:inherit; font-weight:600; color:#fff; background:var(--accent); cursor:pointer; }
      button.secondary { background:var(--accent-strong); }
      .status { margin-top:16px; padding:12px 14px; border-radius:12px; background:rgba(13,107,87,.08); color:var(--ink); white-space:pre-wrap; }
      .status.error { background:rgba(161,40,40,.1); color:var(--danger); }
      .list { display:grid; gap:12px; margin-top:16px; }
      .card { padding:14px; border:1px solid var(--line); border-radius:14px; background:rgba(255,255,255,.55); }
      .card.unread { border-color:rgba(13,107,87,.45); background:rgba(13,107,87,.07); }
      .meta { margin-top:10px; color:var(--muted); font-size:.92rem; }
      .pill { display:inline-block; padding:4px 10px; border-radius:999px; background:rgba(13,107,87,.12); color:var(--accent-strong); font-size:.85rem; margin-bottom:8px; }
      @media (max-width:720px) {
        .topbar { justify-content:space-between; }
        .topnav { display:none; }
        .mobile-nav-button { display:flex; }
        .mobile-top-title { display:block; }
        .hero h1 { display:none; }
        .notify-link { margin-left:auto; }
        .nav-toggle:checked ~ .mobile-overlay { display:block; position:fixed; inset:0; background:rgba(27,26,23,.36); z-index:25; }
        .nav-toggle:checked ~ .mobile-drawer { transform:translateX(0); }
      }
    </style>
  </head>
  <body>
    <main>
      <input id="nav-toggle" class="nav-toggle" type="checkbox">
      <div class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
          <label for="nav-toggle" class="mobile-nav-button" aria-label="Open navigation menu"><span></span></label>
          <div class="mobile-top-title">Notifications</div>
          <nav class="topnav" aria-label="Primary">
            <a href="./index.html">Controls</a>
            <a href="./settings.html">Settings</a>
            <a href="./community.html">Community</a>
            <a href="./readings.html">Daily Readings</a>
          </nav>
        </div>
        <a class="notify-link" href="./notifications.html" aria-current="page">Alerts <span class="notify-count" data-notify-count hidden>0</span></a>
      </div>
      <label for="nav-toggle" class="mobile-overlay" aria-hidden="true"></label>
      <aside class="mobile-drawer" aria-label="Mobile navigation">
        <nav>
          <a href="./index.html">Controls</a>
          <a href="./settings.html">Settings</a>
          <a href="./community.html">Community</a>
          <a href="./readings.html">Daily Readings</a>
          <a href="./notifications.html">Notifications</a>
        </nav>
      </aside>
      <div class="hero">
        <h1>Notifications</h1>
        <p>See who posted intentions, who loved your messages, and who activated their lights.</p>
      </div>

      <section class="panel">
        <h2>Inbox</h2>
        <div class="actions">
          <button id="refresh">Refresh</button>
          <button id="mark-all" class="secondary">Mark All Read</button>
        </div>
        <div id="empty" class="status">Loading notifications...</div>
        <div id="list" class="list"></div>
      </section>

      <section class="panel">
        <h2>Status</h2>
        <div id="status" class="status">Idle.</div>
      </section>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const config = window.PRAYERBOX_PORTAL_CONFIG || {};
      const projectUrl = config.projectUrl || "";
      const anonKey = config.anonKey || "";
      const els = {
        empty: document.querySelector("#empty"),
        list: document.querySelector("#list"),
        markAll: document.querySelector("#mark-all"),
        refresh: document.querySelector("#refresh"),
        status: document.querySelector("#status"),
      };
      let supabase = null;

      function setStatus(message, isError = false) {
        els.status.textContent = message;
        els.status.classList.toggle("error", isError);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function getClient() {
        if (!projectUrl || !anonKey) {
          throw new Error("Portal config is missing. Ask the admin to update portal/config.js.");
        }
        if (!supabase) {
          supabase = createClient(projectUrl, anonKey);
        }
        return supabase;
      }

      async function authedFetch(path, options = {}) {
        const client = getClient();
        const { data: sessionData } = await client.auth.getSession();
        const accessToken = sessionData.session?.access_token;
        if (!accessToken) throw new Error("Sign in first from the Settings page.");
        return fetch(`${projectUrl}${path}`, {
          ...options,
          headers: {
            apikey: anonKey,
            Authorization: `Bearer ${accessToken}`,
            ...(options.headers || {}),
          },
        });
      }

      function renderNotifications(items, unreadCount) {
        document.querySelectorAll("[data-notify-count]").forEach((badge) => {
          badge.hidden = !unreadCount;
          badge.textContent = unreadCount > 99 ? "99+" : String(unreadCount || 0);
        });
        els.list.innerHTML = "";
        if (!items.length) {
          els.empty.textContent = "No notifications yet.";
          return;
        }

        els.empty.textContent = `${unreadCount} unread notification${unreadCount === 1 ? "" : "s"}.`;
        items.forEach((item) => {
          const card = document.createElement("article");
          card.className = `card ${item.isRead ? "" : "unread"}`;
          card.innerHTML = `
            <span class="pill">${escapeHtml(item.type.replaceAll("_", " "))}</span>
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.body)}</p>
            <div class="meta">${new Date(item.createdAt).toLocaleString()}</div>
            ${item.isRead ? "" : `<div class="actions"><button class="mark-read secondary" data-id="${item.id}">Mark Read</button></div>`}`;
          els.list.appendChild(card);
        });

        els.list.querySelectorAll(".mark-read").forEach((button) => {
          button.addEventListener("click", () => wrap(
            () => markRead(button.dataset.id || ""),
            button,
          ));
        });
      }

      async function loadNotifications() {
        const response = await authedFetch("/functions/v1/my-notifications", { method: "GET" });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "Failed to load notifications.");
        renderNotifications(payload.notifications || [], payload.unreadCount || 0);
        setStatus("Notifications refreshed.");
      }

      async function markRead(notificationId) {
        if (!notificationId) throw new Error("Notification id is required.");
        const response = await authedFetch("/functions/v1/my-notifications", {
          body: JSON.stringify({ notificationId }),
          headers: { "Content-Type": "application/json" },
          method: "POST",
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "Failed to mark notification as read.");
        renderNotifications(payload.notifications || [], payload.unreadCount || 0);
        setStatus("Marked notification as read.");
      }

      async function markAllRead() {
        const response = await authedFetch("/functions/v1/my-notifications", {
          body: JSON.stringify({ markAll: true }),
          headers: { "Content-Type": "application/json" },
          method: "POST",
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "Failed to mark notifications as read.");
        renderNotifications(payload.notifications || [], payload.unreadCount || 0);
        setStatus("Marked all notifications as read.");
      }

      async function wrap(fn, button) {
        try {
          button.disabled = true;
          await fn();
        } catch (error) {
          setStatus(error.message || "Request failed.", true);
        } finally {
          button.disabled = false;
        }
      }

      els.refresh.addEventListener("click", () => wrap(loadNotifications, els.refresh));
      els.markAll.addEventListener("click", () => wrap(markAllRead, els.markAll));

      await loadNotifications();
    </script>
  </body>
</html>
