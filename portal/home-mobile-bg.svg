<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 675 1200" role="img" aria-labelledby="title desc">
  <title id="title">Prayerbox mobile home background</title>
  <desc id="desc">Blue background with a gold monstrance and the words I AM THE BREAD OF LIFE.</desc>
