name: Process Reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger process-reminders function
        env:
          PRAYERBOX_REMINDER_SECRET: ${{ secrets.PRAYERBOX_REMINDER_SECRET }}
        run: |
          if [ -z "$PRAYERBOX_REMINDER_SECRET" ]; then
            echo "Missing GitHub secret: PRAYERBOX_REMINDER_SECRET"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "x-reminder-secret: $PRAYERBOX_REMINDER_SECRET" \
            "https://qtvskyncpuznnzuptgoc.supabase.co/functions/v1/process-reminders"
